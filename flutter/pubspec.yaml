name: dkmads_dmp
description: DKMads DMP Flutter SDK — wraps iOS and Android native SDKs
version: 0.1.0
homepage: https://dmp.dkmads.com

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  shared_preferences: ^2.3.3
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.dkmads.dmp
        pluginClass: DmpFlutterPlugin
      ios:
        pluginClass: DmpFlutterPlugin
